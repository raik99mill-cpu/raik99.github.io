<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAWL DIARY</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        * {margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}
        body {background:#12121F;color:#E2E2F0;padding:15px;}
        .container {max-width:550px;margin:0 auto;}
        .card {background:#1E1E2F;border-radius:12px;padding:20px;margin:20px 0;border:1px solid #333;}
        .sucesso {border-color:#25D366;}
        .fechado {border-color:#FF7090;}
        .interruptor {display:flex;justify-content:space-between;align-items:center;background:#252538;padding:12px;border-radius:8px;margin:15px 0;}
        .switch {position:relative;display:inline-block;width:48px;height:24px;}
        .switch input {opacity:0;width:0;height:0;}
        .slider {position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#444;border-radius:24px;transition:0.3s;}
        .slider:before {position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background:#FFF;border-radius:50%;transition:0.3s;}
        input:checked + .slider {background:#25D366;}
        input:checked + .slider:before {transform:translateX(24px);}
        input {width:100%;padding:12px;margin:8px 0;background:#252538;border:1px solid #444;border-radius:8px;color:#FFF;font-size:16px;}
        button {width:100%;padding:14px;border:none;border-radius:8px;font-weight:bold;margin:8px 0;cursor:pointer;font-size:16px;}
        .btn-enviar {background:linear-gradient(90deg,#FF2EB6,#9D2EFF);color:#FFF;}
        .btn-sair {background:#E53935;color:#FFF;}
        .mensagem {padding:10px;border-radius:6px;margin:10px 0;text-align:center;}
        .msg-sucesso {background:#203540;color:#4CD9B0;}
        .msg-erro {background:#402025;color:#FF7090;}
        .msg-aviso {background:#353020;color:#FFD566;}
        .oculto {display:none !important;}
        h2 {text-align:center;margin:10px 0;}
    </style>
</head>
<body>
<div class="container">

    <!-- Tela Inicial -->
    <div id="telaFechada" class="card fechado">
        <h2>🚫 Inscrições Fechadas</h2>
        <p style="text-align:center;margin:15px 0;">As inscrições estão temporariamente encerradas.</p>
        <input type="password" id="senha" placeholder="Digite a senha de admin">
        <button onclick="acessar()">Acessar Painel</button>
    </div>

    <div id="telaAberta" class="card sucesso oculto">
        <h2>✅ INSCRIÇÕES ABERTAS!</h2>
        <p style="text-align:center;margin:15px 0;">Participe da competição agora mesmo!</p>
        <input type="password" id="senha2" placeholder="Digite a senha de admin">
        <button onclick="acessar()">Acessar Painel</button>
    </div>

    <!-- Painel de Controle -->
    <div id="painel" class="card oculto">
        <h2>🔐 Controle do Sistema</h2>
        <div class="interruptor">
            <span>Status: <strong id="textoStatus">DESATIVADO</strong></span>
            <label class="switch">
                <input type="checkbox" id="chkStatus">
                <span class="slider"></span>
            </label>
        </div>
        <button class="btn-enviar" onclick="salvar()">☁️ Enviar para nuvem</button>
        <div id="areaMensagem"></div>
        <button class="btn-sair" onclick="sair()">🔒 Sair</button>
    </div>

</div>

<script>
const SENHA_ADMIN = "996616825";

// ✅ BANCO COM REGRAS DE ACESSO 100% ABERTAS
const firebaseConfig = {
    apiKey: "AIzaSyA9gHdKfJkLmNnPpQqRrSsTtUuVvWwXxYyZz",
    authDomain: "brawl-diary-fixo.firebaseapp.com",
    databaseURL: "https://brawl-diary-fixo-default-rtdb.firebaseio.com",
    projectId: "brawl-diary-fixo",
    storageBucket: "brawl-diary-fixo.appspot.com",
    messagingSenderId: "334455667788",
    appId: "1:334455667788:web:f9d8e7c6b5a43210fedcba"
};

// Inicializa sem erros
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const refStatus = db.ref("status_inscricoes");

// Atualiza automaticamente em todos os aparelhos
refStatus.on("value", (snap) => {
    const dados = snap.val() || { ativo: false };
    atualizarTela(dados.ativo);
});

function atualizarTela(ativo) {
    if (ativo === true) {
        document.getElementById("telaFechada").classList.add("oculto");
        document.getElementById("telaAberta").classList.remove("oculto");
        document.getElementById("textoStatus").textContent = "ATIVADO";
        document.getElementById("textoStatus").style.color = "#25D366";
        document.getElementById("chkStatus").checked = true;
    } else {
        document.getElementById("telaFechada").classList.remove("oculto");
        document.getElementById("telaAberta").classList.add("oculto");
        document.getElementById("textoStatus").textContent = "DESATIVADO";
        document.getElementById("textoStatus").style.color = "#FF7090";
        document.getElementById("chkStatus").checked = false;
    }
}

function acessar() {
    const s1 = document.getElementById("senha").value.trim();
    const s2 = document.getElementById("senha2").value.trim();
    if (s1 === SENHA_ADMIN || s2 === SENHA_ADMIN) {
        document.getElementById("painel").classList.remove("oculto");
        document.getElementById("senha").value = "";
        document.getElementById("senha2").value = "";
    } else {
        alert("❌ Senha incorreta!");
    }
}

function sair() {
    document.getElementById("painel").classList.add("oculto");
    document.getElementById("areaMensagem").innerHTML = "";
}

// ✅ Função de salvar SEM TRAVAMENTO
function salvar() {
    const msg = document.getElementById("areaMensagem");
    msg.innerHTML = `<div class="mensagem msg-aviso">⏳ Salvando...</div>`;

    const estadoAtual = document.getElementById("chkStatus").checked;

    refStatus.set({
        ativo: estadoAtual,
        atualizado_em: new Date().toLocaleString("pt-BR")
    })
    .then(() => {
        msg.innerHTML = `<div class="mensagem msg-sucesso">✅ Salvo! Agora é só atualizar a página no outro celular.</div>`;
        setTimeout(() => msg.innerHTML = "", 4000);
    })
    .catch(erro => {
        msg.innerHTML = `<div class="mensagem msg-erro">❌ Erro: ${erro.message}</div>`;
        console.error(erro);
    });
}

// Disponibiliza funções
window.acessar = acessar;
window.sair = sair;
window.salvar = salvar;
</script>
</body>
</html>
