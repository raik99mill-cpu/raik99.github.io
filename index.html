<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAWL DIARY</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        * {margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}
        body {background:#12121F;color:#E2E2F0;padding:15px;}
        .container {max-width:550px;margin:0 auto;}
        .area-admin {background:#1A1A2E;border:2px solid #554099;border-radius:12px;padding:15px;margin:20px 0;}
        .interruptor {display:flex;justify-content:space-between;align-items:center;background:#252538;padding:10px;border-radius:8px;margin:10px 0;}
        .switch {position:relative;display:inline-block;width:44px;height:22px;}
        .switch input {opacity:0;width:0;height:0;}
        .slider {position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#444;border-radius:22px;transition:0.3s;}
        .slider:before {position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:#FFF;border-radius:50%;}
        input:checked + .slider {background:#25D366;}
        input:checked + .slider:before {transform:translateX(22px);}
        input {width:100%;padding:10px;margin:8px 0;background:#252538;border:1px solid #444;border-radius:8px;color:#FFF;}
        button {width:100%;padding:12px;border:none;border-radius:8px;font-weight:bold;margin:8px 0;cursor:pointer;}
        .btn-enviar {background:linear-gradient(90deg,#FF2EB6,#9D2EFF);color:#FFF;}
        .tela-fechada {text-align:center;padding:50px 20px;background:#1E1E2F;border-radius:12px;border:1px solid #FF7090;margin-top:50px;}
        .tela-aberta {display:none;text-align:center;padding:50px 20px;background:#1E1E2F;border-radius:12px;border:1px solid #25D366;margin-top:50px;}
        .oculto {display:none !important;}
        .sucesso {color:#4CD9B0;text-align:center;margin:10px 0;padding:8px;border-radius:6px;background:#203040;}
        .erro {color:#FF7090;text-align:center;margin:10px 0;padding:8px;border-radius:6px;background:#402020;}
    </style>
</head>
<body>

<div class="container">
    <!-- Tela quando fechado -->
    <div id="telaFechada" class="tela-fechada">
        <h2>🚫 Inscrições Fechadas</h2>
        <p>Volte mais tarde!</p>
        <br>
        <input type="password" id="senhaAdmin" placeholder="Senha Admin">
        <button onclick="entrarAdmin()">Acessar Painel</button>
    </div>

    <!-- Tela quando aberto -->
    <div id="telaAberta" class="tela-aberta">
        <h2>✅ INSCRIÇÕES ABERTAS!</h2>
        <br>
        <input type="password" id="senhaAdmin2" placeholder="Senha Admin">
        <button onclick="entrarAdmin()">Acessar Painel</button>
    </div>

    <!-- Painel Admin -->
    <div id="painelAdmin" class="area-admin oculto">
        <h3 style="text-align:center;">🔐 Controle</h3>
        <div class="interruptor">
            <span>Status: <strong id="statusTexto">DESATIVADO</strong></span>
            <label class="switch"><input type="checkbox" id="statusSistema"><span class="slider"></span></label>
        </div>
        <button class="btn-enviar" onclick="enviarNuvem()">☁️ Enviar para nuvem</button>
        <div id="mensagem"></div>
        <button style="background:#E53935;color:#FFF;" onclick="sairAdmin()">Sair</button>
    </div>
</div>

<script>
const SENHA = "996616825";

// ✅ BANCO 100% LIBERADO, SEM BLOQUEIOS DE NENHUM TIPO
const firebaseConfig = {
  apiKey: "AIzaSyB9e3uXk7RgF8mQ2nP0sT1uV2wX3Y4z5A6B7C8D9E0F1G2H3I4J5K6L7M8N9O0P1Q2R3S4T5U6V7W8X9Y0Z",
  authDomain: "brawl-diario-livre.firebaseapp.com",
  databaseURL: "https://brawl-diario-livre-default-rtdb.firebaseio.com",
  projectId: "brawl-diario-livre",
  storageBucket: "brawl-diario-livre.appspot.com",
  messagingSenderId: "112233445566",
  appId: "1:112233445566:web:abcdef1234567890abcdef"
};

// Inicializa o Firebase
try {
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const ref = db.ref("controle_status");

  // Atualiza a tela automaticamente quando mudar algo
  ref.on("value", (snapshot) => {
    const dados = snapshot.val() || { sistemaAtivo: false };
    atualizarTela(dados.sistemaAtivo);
  });

  function atualizarTela(ativo) {
    if (ativo === true) {
      document.getElementById("telaFechada").style.display = "none";
      document.getElementById("telaAberta").style.display = "block";
      document.getElementById("statusTexto").textContent = "ATIVADO";
      document.getElementById("statusTexto").style.color = "#25D366";
      document.getElementById("statusSistema").checked = true;
    } else {
      document.getElementById("telaFechada").style.display = "block";
      document.getElementById("telaAberta").style.display = "none";
      document.getElementById("statusTexto").textContent = "DESATIVADO";
      document.getElementById("statusTexto").style.color = "#FF7090";
      document.getElementById("statusSistema").checked = false;
    }
  }

  // Função de envio com mensagem garantida
  function enviarNuvem() {
    document.getElementById("mensagem").innerHTML = "⏳ Enviando...";
    document.getElementById("mensagem").className = "sucesso";

    const estado = document.getElementById("statusSistema").checked;

    ref.set({
      sistemaAtivo: estado,
      atualizadoEm: new Date().toLocaleString("pt-BR")
    })
    .then(() => {
      document.getElementById("mensagem").innerHTML = "✅ ENVIADO COM SUCESSO! Agora atualize a página no outro celular.";
      setTimeout(() => document.getElementById("mensagem").innerHTML = "", 5000);
    })
    .catch(erro => {
      document.getElementById("mensagem").innerHTML = "❌ ERRO: " + erro.message;
      document.getElementById("mensagem").className = "erro";
    });
  }

  // Acesso ao painel
  function entrarAdmin() {
    const senha1 = document.getElementById("senhaAdmin").value.trim();
    const senha2 = document.getElementById("senhaAdmin2").value.trim();
    if (senha1 === SENHA || senha2 === SENHA) {
      document.getElementById("painelAdmin").classList.remove("oculto");
      document.getElementById("senhaAdmin").value = "";
      document.getElementById("senhaAdmin2").value = "";
    } else {
      alert("Senha incorreta!");
    }
  }

  function sairAdmin() {
    document.getElementById("painelAdmin").classList.add("oculto");
  }

  // Disponibiliza funções
  window.entrarAdmin = entrarAdmin;
  window.sairAdmin = sairAdmin;
  window.enviarNuvem = enviarNuvem;

} catch (erroInicial) {
  alert("Erro ao carregar sistema: " + erroInicial.message);
}
</script>

</body>
</html>
